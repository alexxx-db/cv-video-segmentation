bundle:
  name: segment-video-app

variables:
  AUTO_SEGMENT_VOLUME_PATH:
    description: "Base volume path for auto-segment inputs, outputs, and descriptions."
    default: /Volumes/public_sector/cv/auto_segment
  PROD_WORKSPACE_ROOT_PATH:
    description: "Root workspace path for the prod target deployment."
    default: /Workspace/Shared/public_sector/
  # SERVICE_PRINCIPAL_NAME:
  #   description: "App service principal."
  #   default: /Workspace/Shared/public_sector/

resources:
  apps:
    segment_video_app:
      name: segment-video-app
      description: "Upload a video + prompt; trigger Databricks Job to segment; display output from Volumes."
      source_code_path: ./app
      resources:
        - name: app-job
          job:
            id: ${resources.jobs.auto_segment_video.id}
            permission: CAN_MANAGE_RUN
  jobs:
    auto_segment_video:
      name: auto-segment-video
      email_notifications:
        on_failure:
          - justin.monaldo@databricks.com
        no_alert_for_skipped_runs: true
      notification_settings:
        no_alert_for_skipped_runs: true
      trigger:
        pause_status: PAUSED
        file_arrival:
          url: ${var.AUTO_SEGMENT_VOLUME_PATH}/inputs/
      max_concurrent_runs: 5
      tasks:
        - task_key: auto-segment-video
          notebook_task:
            # notebook_path: ./notebooks/job-auto-segment-video-fmapi.ipynb
            notebook_path: ./notebooks/job-auto-segment-video.ipynb
            base_parameters:
              trigger_location: "{{job.trigger.file_arrival.location}}"
              prompt: weimaraner
              frame_stride: "30"
              threshold: "0.5"
              truncate: "1"
            source: WORKSPACE
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED

targets:
  dev:
    default: true
    mode: development
  prod:
    mode: production
    workspace:
      root_path: ${var.PROD_WORKSPACE_ROOT_PATH}
  demo:
    mode: production
    workspace:
      root_path: ${var.PROD_WORKSPACE_ROOT_PATH}


